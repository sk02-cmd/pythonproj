name: Build and Push to ECR

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Login to ECR
        run: aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin 320060061347.dkr.ecr.eu-north-1.amazonaws.com  


      - name: Build image
        run: docker build -t vapt-tools .

      - name: Tag image
        run: docker tag vapt-tools 320060061347.dkr.ecr.eu-north-1.amazonaws.com/pythonproj:latest

      - name: Push to ECR
        run: docker push 320060061347.dkr.ecr.eu-north-1.amazonaws.com/pythonproj:latest
